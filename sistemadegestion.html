<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    <script>
        if(sessionStorage.getItem("login") !== "ok"){ window.location.href = "login.html"; }
    </script>
    <style>
        /* Estilos específicos para que el árbol de carpetas se vea bien con tu fondo oscuro */
        .container { margin: 40px 5%; min-height: 400px; }
        .carpeta-root { 
            margin-bottom: 30px; 
            background: rgba(44, 62, 80, 0.4); 
            backdrop-filter: blur(12px);
            border-radius: 16px; 
            padding: 25px; 
            border-left: 5px solid #1abc9c; 
        }
        .titulo-c { color: #1abc9c; font-weight: bold; font-size: 1.5rem; margin-bottom: 15px; text-transform: uppercase; }
        .rama-hijo { margin-left: 20px; border-left: 2px solid rgba(26, 188, 156, 0.3); padding-left: 20px; }
        .link-item { padding: 10px 0; position: relative; }
        .link-item a { color: #ecf0f1; text-decoration: none; transition: 0.3s; }
        .link-item a:hover { color: #1abc9c; padding-left: 5px; }
        
        /* Estilos para la zona de administración */
        .admin-zona { background: #1a252f; padding: 40px 5%; border-top: 4px solid #1abc9c; margin-top: 50px; }
        .inputs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; justify-content: center; }
        input, select { background: #0f171e; border: 1px solid #34495e; color: #fff; padding: 12px; border-radius: 5px; outline: none; }
        .btn-admin { background: #1abc9c; color: white; border: none; padding: 12px 25px; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="wrapper">
    <!-- HEADER (Basado exactamente en tu CSS) -->
    <header id="header">
        <div id="logo-container">
            <img src="logo de la empresa.png" id="logo-imagen" alt="Logo">
        </div>
        <div id="titulo-container">
            <h1>SISTEMA DE GESTIÓN</h1>
            <p>CALIDAD QUE CONECTA TUS PROYECTOS</p>
        </div>
    </header>

    <!-- NAVEGACIÓN (Basado exactamente en tu CSS) -->
    <nav id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="sistemadegestion.html" style="background: #1abc9c; color: white;">SISTEMA DE GESTIÓN</a>
        <a href="otros.html">MAGAZINE</a>
        <a href="contactos.html">CONTACTOS</a>
    </nav>

    <!-- CUERPO DE LA PÁGINA -->
    <main class="container" id="visor">
        <!-- Aquí se cargan las carpetas de Firebase -->
    </main>

    <!-- ZONA DE ADMINISTRACIÓN -->
    <section class="admin-zona">
        <div class="inputs">
            <input type="text" id="rn" placeholder="Nombre de Carpeta Nueva">
            <button class="btn-admin" onclick="saveR()">+ CREAR CARPETA</button>
        </div>

        <div class="inputs" style="background: rgba(26, 188, 156, 0.05); padding: 25px; border-radius: 15px; border: 1px dashed #1abc9c;">
            <select id="rd" onchange="updatePadres()"></select>
            <select id="padreId"><option value="">Archivo Raíz (Principal)</option></select>
            <input type="text" id="fn" placeholder="Nombre del Documento">
            <input type="text" id="fl" placeholder="URL de Google Drive">
            <button class="btn-admin" onclick="saveF()">SUBIR A LA RAMA</button>
            <button onclick="verG()" style="background:transparent; border:1px solid #555; color:#aaa; padding:10px; cursor:pointer;">ADMINISTRAR</button>
        </div>
        <div id="gestion" style="display:none;"><div id="listaG"></div></div>
    </section>

    <!-- FOOTER (Basado exactamente en tu CSS) -->
    <footer id="footer">
     <p>&copy; INCOREA-CABLES</p>
       
    </footer>
</div>

<script>
    const DB_URL = "https://httpsincorea-cables-default-rtdb.firebaseio.com/sistemaServicios";
    const ADMIN_KEY = "12345";
    let globalData = {};

    window.onload = load;

    async function load() {
        try {
            const res = await fetch(`${DB_URL}.json`);
            globalData = await res.json() || {};
            renderVisor();
            renderSelects();
        } catch (e) { console.error("Error cargando DB", e); }
    }

    function renderVisor() {
        const visor = document.getElementById('visor');
        visor.innerHTML = "";
        Object.keys(globalData).forEach(idR => {
            const r = globalData[idR];
            let html = `<div class="carpeta-root">
                <div class="titulo-c">📂 ${r.nombre}</div>
                <div class="rama-hijo">`;
            if(r.archivos) html += buildTree(r.archivos);
            html += `</div></div>`;
            visor.innerHTML += html;
        });
    }

    function buildTree(archivos, padreId = "") {
        let html = "";
        Object.keys(archivos).forEach(idF => {
            const f = archivos[idF];
            if ((f.padre || "") === padreId) {
                let fileId = f.link.match(/[-\w]{25,}/);
                let dLink = (fileId && f.link.includes("drive.google.com")) ? 
                    `https://drive.google.com/uc?export=download&id=${fileId[0]}` : f.link;
                html += `<div class="link-item">
                    <a href="${dLink}" target="_blank">📄 ${f.nombre}</a>
                    <div class="rama-hijo">${buildTree(archivos, idF)}</div>
                </div>`;
            }
        });
        return html;
    }

    function renderSelects() {
        const selectR = document.getElementById('rd');
        selectR.innerHTML = '<option value="">Seleccionar Carpeta...</option>';
        Object.keys(globalData).forEach(id => {
            selectR.innerHTML += `<option value="${id}">${globalData[id].nombre}</option>`;
        });
    }

    function updatePadres() {
        const idR = document.getElementById('rd').value;
        const selectP = document.getElementById('padreId');
        selectP.innerHTML = '<option value="">Archivo Raíz (Principal)</option>';
        if(idR && globalData[idR].archivos) {
            Object.keys(globalData[idR].archivos).forEach(idF => {
                selectP.innerHTML += `<option value="${idF}">Dentro de: ${globalData[idR].archivos[idF].nombre}</option>`;
            });
        }
    }

    async function saveF() {
        const idR = document.getElementById('rd').value;
        const pId = document.getElementById('padreId').value;
        const n = document.getElementById('fn').value.trim();
        const l = document.getElementById('fl').value.trim();
        if(!idR || !n || !l || !auth()) return;
        await fetch(`${DB_URL}/${idR}/archivos.json`, { method: 'POST', body: JSON.stringify({nombre: n, link: l, padre: pId}) });
        load();
    }

    async function saveR() {
        const n = document.getElementById('rn').value.trim();
        if(!n || !auth()) return;
        await fetch(`${DB_URL}.json`, { method: 'POST', body: JSON.stringify({nombre: n}) });
        load();
    }

    function auth() { return prompt("Clave de Administrador:") === ADMIN_KEY; }
    function verG() { if(auth()) document.getElementById('gestion').style.display = "block"; }
    function salir(){ sessionStorage.removeItem("login"); window.location.href = "login.html"; }
</script>
</body>
</html>
