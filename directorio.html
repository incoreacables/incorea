    .visor-directo-container {

        border-radius: 12px;
        padding: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        overflow: hidden; /* Esto es clave para recortar la barra superior */
    }
    .iframe-responsivo {
        position: relative;
        width: 100%;
        height: 75vh;
        border-radius: 8px;
        overflow: hidden;
    }

    .iframe-responsivo iframe {
        position: absolute;
        top: -36px; /* Empuja el iframe hacia arriba para tapar la barra "Modo Lectura" */
        left: 0;
        width: 100%;
        height: calc(100% + 36px); /* Le suma el tamaño que empujamos arriba para que no quede un hueco abajo */
        border: none;
    }
</style>
