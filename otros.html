<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES - MAGAZINE</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    <style>
        body { 
            font-family: sans-serif; 
            background: #0e161d; 
            color: white; 
            margin: 0;
        }

        /* ESTILO IGUAL AL DIRECTORIO */
        .visor-directo-container {
            margin: 30px 5%;
            background: rgba(17, 29, 40, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(26, 188, 156, 0.4);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .iframe-responsivo {
            position: relative;
            width: 100%;
            height: 75vh; /* Altura adaptable */
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        .iframe-responsivo iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* PANEL DE ACTUALIZACIÓN */
        .admin-panel {
            margin: 20px 5% 40px 5%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(26, 188, 156, 0.2);
        }

        .admin-panel input {
            background: #1a252f;
            border: 1px solid #333;
            color: #1abc9c;
            padding: 12px;
            border-radius: 6px;
            width: 300px;
            outline: none;
        }

        .admin-panel button {
            background: #1abc9c;
            border: none;
            color: #0e161d;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .admin-panel button:hover {
            background: #16a085;
            transform: scale(1.02);
        }

        #footer { 
            padding: 40px; 
            text-align: center; 
            background: #0e161d; 
            border-top: 4px solid #1abc9c; 
        }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="header">
        <div id="logo-container"><img src="logo de la empresa.png" id="logo-imagen" alt="Logo"></div>
        <div id="titulo-container">
            <h1>Calidad que conecta tus proyectos</h1>
            <p>Estamos para ayudarte</p>
        </div>
    </div>

    <div id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="sistemadegestion.html">SISTEMA DE GESTIÓN</a>
        <a href="global.html">GLOBAL</a>
        <a href="otros.html">MAGAZINE</a>
        <a href="contactos.html">CONTACTOS</a>
    </div>

    <div id="comentarios-container" style="padding: 40px 5% 10px 5%;">
        <div class="comentarios-header" style="border-bottom: 2px solid #1c2b3a; padding-bottom: 20px; margin-bottom: 10px;">
            <h2 style="color: #ffffff; letter-spacing: 1.5px; margin: 0; font-family: 'Segoe UI', sans-serif; font-weight: 800; font-size: 32px;">INCO MAGAZINE 2026</h2>
            <p style="color: #1abc9c; margin-top: 5px; font-weight: 600; letter-spacing: 0.8px; font-size: 15px;">PUBLICACIONES RECIENTES</p>
        </div>
    </div>

    <div class="visor-directo-container">
        <div class="iframe-responsivo">
            <iframe id="visorPDF" src="" allowfullscreen></iframe>
        </div>
    </div>

    <div class="admin-panel">
        <input type="text" id="nuevoPDF" placeholder="Nombre del archivo PDF (ej: revista.pdf)">
        <button onclick="cambiarRevista()">ACTUALIZAR MAGAZINE</button>
    </div>

    <div id="footer">
        <p>&copy; INCOREA-CABLES</p>
    </div>
</div>

<script>
    // URL de tu base de datos Firebase
    const DB_URL = "https://httpsincorea-cables-default-rtdb.firebaseio.com/archivoOtros.json";

    // CARGAR EL PDF AUTOMÁTICAMENTE AL ENTRAR
    window.onload = async function() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(data && data.nombre) {
                const timestamp = new Date().getTime();
                // Usamos el visor nativo del navegador con parámetros para ocultar barras
                const urlFinal = data.nombre + "#toolbar=0&navpanes=0&view=FitW&t=" + timestamp;
                document.getElementById('visorPDF').src = urlFinal;
            }
        } catch (e) { console.error("Error cargando base de datos:", e); }
    };

    // FUNCIÓN PARA CAMBIAR EL ARCHIVO
    async function cambiarRevista() {
        const nombre = document.getElementById('nuevoPDF').value.trim();
        if(!nombre) return alert("Por favor, ingresa el nombre del archivo PDF");
        
        const pass = prompt("Ingresa la clave de administrador:");
        if(pass === "1234") {
            try {
                await fetch(DB_URL, { 
                    method: 'PUT', 
                    body: JSON.stringify({ nombre: nombre }) 
                });
                alert("¡Magazine actualizado correctamente!");
                location.reload();
            } catch (e) {
                alert("Error al conectar con la base de datos");
            }
        } else {
            alert("Clave incorrecta");
        }
    }
</script>

</body>
</html>
