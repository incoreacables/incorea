<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES - Otros</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    <style>
        body { font-family: sans-serif; background: #0e161d; color: white; margin: 0; }
        
        /* Contenedor principal para que ocupe todo el ancho */
        .otros-full-container { 
            width: 100%; 
            margin: 0; 
            padding: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* El visor ahora ocupa todo el ancho y es más alto */
        .visor-pdf-full {
            width: 100%;
            height: 90vh; /* Ocupa el 90% de la altura de la pantalla */
            background: #1a1a1a;
            border: none;
            overflow: hidden;
            display: block;
        }
        
        iframe { width: 100%; height: 100%; border: none; }

        /* Cuadro de administración pequeño y al final */
        .admin-footer {
            margin-top: 50px;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 5px;
            border: 1px solid rgba(26, 188, 156, 0.1);
        }
        .admin-footer input { 
            padding: 5px; 
            width: 180px; 
            font-size: 12px;
            background: #0e161d;
            border: 1px solid #333;
            color: #fff;
            outline: none;
        }
        .admin-footer button { 
            padding: 5px 10px; 
            background: #1abc9c; 
            border: none; 
            color: #0e161d; 
            font-size: 12px;
            font-weight: bold; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="header">
        <div id="logo-container">
            <img src="logo de la empresa.png" id="logo-imagen">
        </div>
        <div id="titulo-container">
            <h1>INCOREA CABLES</h1>
            <p id="sub-txt">OTROS RECURSOS</p>
        </div>
    </div>

    <div id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="sistemadegestion.html">SISTEMA DE GESTIÓN</a>
        <a href="global.html">GLOBAL</a>
        <a href="otros.html">OTROS</a>
        <a href="contactos.html">CONTACTOS</a>
    </div>

    <div class="otros-full-container">
        <div id="contenedorPDF" class="visor-pdf-full">
            <iframe id="iframePDF" src="" allow="autoplay"></iframe>
        </div>

        <div class="admin-footer">
            <input type="text" id="nombreArchivo" placeholder="Link o nombre.pdf">
            <button onclick="actualizarBoletin()">CAMBIAR REVISTA</button>
        </div>
    </div>

    <div id="footer">
        <p>&copy; INCOREA CABLES</p>
    </div>
</div>

<script>
    const DB_URL = "https://httpsincorea-cables-default-rtdb.firebaseio.com/archivoOtros.json";

    window.onload = async function() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(data && data.nombre) {
                // Mantenemos los parámetros para que se vea limpio (sin barras laterales)
                const linkFinal = data.nombre + "#toolbar=0&navpanes=0&scrollbar=0";
                document.getElementById('iframePDF').src = linkFinal;
            }
        } catch (e) { console.error(e); }
    };

    async function actualizarBoletin() {
        const nombre = document.getElementById('nombreArchivo').value.trim();
        if(!nombre) return alert("Ingresa el nombre del archivo");
        
        const pass = prompt("Clave:");
        if(pass === "1234") {
            await fetch(DB_URL, {
                method: 'PUT',
                body: JSON.stringify({ nombre: nombre })
            });
            alert("Actualizado");
            location.reload();
        }
    }
</script>

</body>
</html>
