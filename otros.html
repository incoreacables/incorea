<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES - Otros</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    <style>
        body { 
            font-family: sans-serif; 
            background: #0e161d; 
            color: white; 
            margin: 0;
        }

        .seccion-revista {
            max-width: 1200px; /* Un poco más ancho para que luzca el diseño */
            margin: 20px auto;
            padding: 0 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* CAMBIO CLAVE: Quitamos el límite de altura para que se estire */
        .visor-slide {
            width: 100%;
            height: 2500px; /* Ajusta este número según el largo de tu revista (ej: 3000px, 5000px) */
            background: #16232d;
            border-radius: 8px;
            border: 1px solid rgba(26, 188, 156, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
        }

        .admin-footer {
            margin: 40px 0;
            padding: 15px;
            background: rgba(26, 188, 156, 0.05);
            border-radius: 50px;
            border: 1px solid rgba(26, 188, 156, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-footer input { 
            background: #0e161d;
            border: 1px solid #333;
            color: #1abc9c;
            padding: 8px 15px;
            border-radius: 20px;
            outline: none;
            width: 300px;
        }

        .admin-footer button { 
            background: #1abc9c; 
            border: none; 
            color: #0e161d; 
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold; 
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="header">
        <div id="logo-container"><img src="logo de la empresa.png" id="logo-imagen"></div>
        <div id="titulo-container">
            <h1>INCOREA CABLES</h1>
            <p id="sub-txt">REVISTA DIGITAL</p>
        </div>
    </div>

    <div id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="sistemadegestion.html">SISTEMA DE GESTIÓN</a>
        <a href="global.html">GLOBAL</a>
        <a href="otros.html">OTROS</a>
        <a href="contactos.html">CONTACTOS</a>
    </div>

    <div class="seccion-revista">
        <div class="visor-slide">
            <iframe id="iframePDF" src="Inco Magazine_Edición 003_Abr2026.pdf#toolbar=0&navpanes=0&view=FitW" allow="autoplay"></iframe>
        </div>

        <div class="admin-footer">
            <input type="text" id="nombreArchivo" placeholder="Nombre del nuevo PDF...">
            <button onclick="actualizarBoletin()">ACTUALIZAR</button>
        </div>
    </div>

    <div id="footer">
        <p>&copy; INCOREA CABLES</p>
    </div>
</div>

<script>
    const DB_URL = "https://httpsincorea-cables-default-rtdb.firebaseio.com/archivoOtros.json";

    window.onload = async function() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(data && data.nombre) {
                // Usamos FitW para que se ajuste al ANCHO total
                document.getElementById('iframePDF').src = data.nombre + "#toolbar=0&navpanes=0&view=FitW";
            }
        } catch (e) { console.error(e); }
    };

    async function actualizarBoletin() {
        const nombre = document.getElementById('nombreArchivo').value.trim();
        if(!nombre) return alert("Escribe el nombre del archivo");
        const pass = prompt("Clave:");
        if(pass === "1234") {
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify({ nombre: nombre }) });
            location.reload();
        }
    }
</script>

</body>
</html>
