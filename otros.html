<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES - Otros</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    <style>
        /* ESTILO GLOBAL ADAPTABLE */
        body { 
            font-family: sans-serif; 
            background: #0e161d; 
            color: white; 
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Contenedor principal que se ajusta */
        #wrapper { flex: 1; }

        .seccion-revista {
            width: 100%;
            max-width: 1100px; 
            margin: 0 auto;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* VISOR RESPONSIVO: Se adapta a la pantalla del dispositivo */
        .visor-contenedor {
            width: 100%;
            /* En PC se ve alto, en móvil usa el alto de la pantalla */
            height: 80vh; 
            min-height: 500px;
            background: #16232d;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            margin-bottom: 20px;
        }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
        }

        /* Panel de admin que no se rompe en celular */
        .admin-footer {
            width: 100%;
            max-width: 500px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: flex;
            flex-wrap: wrap; /* Para que los botones bajen si no caben */
            gap: 10px;
            border: 1px solid rgba(26, 188, 156, 0.2);
            justify-content: center;
        }
        
        .admin-footer input { 
            background: #1a252f; 
            border: 1px solid #333; 
            color: #1abc9c; 
            padding: 10px; 
            border-radius: 5px; 
            flex: 1; /* El input crece para llenar espacio */
            min-width: 200px;
            outline: none;
        }
        
        .admin-footer button { 
            background: #1abc9c; 
            border: none; 
            color: #0e161d; 
            padding: 10px 20px; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer;
        }

        #footer { 
            text-align: center; 
            padding: 20px; 
            background: #0a1015;
            color: #555; 
        }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="header">
        <div id="logo-container"><img src="logo de la empresa.png" id="logo-imagen"></div>
        <div id="titulo-container">
            <h1>INCOREA CABLES</h1>
            <p id="sub-txt">REVISTA DIGITAL</p>
        </div>
    </div>

    <div id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="sistemadegestion.html">SISTEMA DE GESTIÓN</a>
        <a href="global.html">GLOBAL</a>
        <a href="otros.html">MAGAZINE</a>
        <a href="contactos.html">CONTACTOS</a>
    </div>

    <div class="seccion-revista">
        <div class="visor-contenedor">
            <iframe id="iframePDF" src=""></iframe>
        </div>

        <div class="admin-footer">
            <input type="text" id="nombreArchivo" placeholder="Escribe el nombre del PDF...">
            <button onclick="actualizarBoletin()">ACTUALIZAR</button>
        </div>
    </div>
</div>

<div id="footer">
    <p>&copy; INCOREA-CABLES</p>
</div>

<script>
    const DB_URL = "https://httpsincorea-cables-default-rtdb.firebaseio.com/archivoOtros.json";

    window.onload = async function() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(data && data.nombre) {
                const timestamp = new Date().getTime();
                // Parámetros para limpiar la interfaz del PDF
                const pdfUrl = data.nombre + "#toolbar=0&navpanes=0&view=FitW&t=" + timestamp;
                document.getElementById('iframePDF').src = pdfUrl;
            }
        } catch (e) { console.error("Error cargando base de datos:", e); }
    };

    async function actualizarBoletin() {
        const nombre = document.getElementById('nombreArchivo').value.trim();
        if(!nombre) return alert("Escribe el nombre del archivo");
        
        const pass = prompt("Clave:");
        if(pass === "1234") {
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify({ nombre: nombre }) });
            location.reload();
        }
    }
</script>

</body>
</html>
