<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES - Otros</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    <style>
        body { font-family: sans-serif; background: #0e161d; color: white; margin: 0; }
        .otros-container { max-width: 1100px; margin: 40px auto; padding: 20px; text-align: center; }
        .visor-pdf {
            width: 100%;
            height: 85vh;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid #1abc9c33;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            margin-top: 20px;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .admin-link {
            background: rgba(26, 188, 156, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: inline-block;
            border: 1px dashed #1abc9c;
        }
        .admin-link input { padding: 8px; width: 250px; border-radius: 4px; border: none; outline: none; }
        .admin-link button { padding: 8px 15px; background: #1abc9c; border: none; color: #0e161d; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="otros.html">OTROS</a>
        <a href="contactos.html">CONTACTOS</a>
    </div>

    <div class="otros-container">
        <div class="admin-link">
            <input type="text" id="nombreArchivo" placeholder="magazine_003.pdf">
            <button onclick="actualizarBoletin()">ACTUALIZAR</button>
        </div>

        <div id="contenedorPDF" class="visor-pdf">
            <iframe id="iframePDF" src=""></iframe>
        </div>
    </div>
</div>

<script>
    const DB_URL = "https://httpsincorea-cables-default-rtdb.firebaseio.com/archivoOtros.json";

    window.onload = async function() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(data && data.nombre) {
                // Esto busca el archivo en tu GitHub
                document.getElementById('iframePDF').src = data.nombre;
            }
        } catch (e) { console.error(e); }
    };

    async function actualizarBoletin() {
        // CORRECCIÓN: Aquí obtenemos el valor del input por su ID
        const nombre = document.getElementById('nombreArchivo').value;
        
        if(!nombre) return alert("Escribe el nombre del archivo");
        
        const pass = prompt("Clave:");
        if(pass === "1234") {
            await fetch(DB_URL, {
                method: 'PUT',
                body: JSON.stringify({ nombre: nombre })
            });
            alert("¡Actualizado!");
            location.reload();
        } else {
            alert("Clave incorrecta");
        }
    }
</script>

</body>
</html>
