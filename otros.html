<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES - Otros</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    <style>
        body { 
            font-family: sans-serif; 
            background: #0e161d; 
            color: white; 
            margin: 0;
        }

        /* Contenedor que se adapta a PC y Móvil */
        .seccion-revista {
            width: 100%;
            max-width: 1100px; 
            margin: 0 auto;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Visor que asoma directamente sin descargar */
        .visor-marco {
            width: 100%;
            height: 80vh; /* Se ajusta al alto de la pantalla del dispositivo */
            background: #16232d;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
        }

        /* Admin organizado */
        .admin-footer {
            width: 90%;
            max-width: 500px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid rgba(26, 188, 156, 0.2);
            justify-content: center;
        }
        .admin-footer input { background: #1a252f; border: 1px solid #333; color: #1abc9c; padding: 10px; border-radius: 5px; flex: 1; min-width: 200px; }
        .admin-footer button { background: #1abc9c; border: none; color: #0e161d; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="header">
        <div id="logo-container"><img src="logo de la empresa.png" id="logo-imagen"></div>
        <div id="titulo-container">
            <h1>INCOREA CABLES</h1>
            <p id="sub-txt">REVISTA DIGITAL</p>
        </div>
    </div>

    <div id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="sistemadegestion.html">SISTEMA DE GESTIÓN</a>
        <a href="global.html">GLOBAL</a>
        <a href="otros.html">MAGAZINE</a>
        <a href="contactos.html">CONTACTOS</a>
    </div>

    <div class="seccion-revista">
        <div class="visor-marco">
            <iframe id="iframePDF" src=""></iframe>
        </div>

        <div class="admin-footer">
            <input type="text" id="nombreArchivo" placeholder="Nombre del PDF...">
            <button onclick="actualizarBoletin()">ACTUALIZAR</button>
        </div>
    </div>
</div>

<script>
    const DB_URL = "https://httpsincorea-cables-default-rtdb.firebaseio.com/archivoOtros.json";

    window.onload = async function() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(data && data.nombre) {
                const timestamp = new Date().getTime();
                // Forzamos la vista embebida para que no pida descarga
                const urlFinal = data.nombre + "#toolbar=0&navpanes=0&view=FitW&t=" + timestamp;
                document.getElementById('iframePDF').src = urlFinal;
            }
        } catch (e) { console.error(e); }
    };

    async function actualizarBoletin() {
        const nombre = document.getElementById('nombreArchivo').value.trim();
        if(!nombre) return alert("Escribe el nombre");
        const pass = prompt("Clave:");
        if(pass === "1234") {
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify({ nombre: nombre }) });
            location.reload();
        }
    }
</script>

</body>
</html>
