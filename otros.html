<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES - Otros</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    <style>
        body { 
            font-family: sans-serif; 
            background: #0e161d; 
            color: white; 
            margin: 0;
            overflow-x: hidden;
        }

        /* Contenedor que deja respirar el diseño */
        .seccion-revista {
            max-width: 1050px; 
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Visor estilo presentación/diapositivas */
        .visor-slide {
            width: 100%;
            height: 85vh; 
            background: #16232d;
            border-radius: 12px;
            border: 1px solid rgba(26, 188, 156, 0.2);
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            overflow: hidden;
        }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
        }

        /* Cuadro de administración discreto al final */
        .admin-footer {
            margin-top: 40px;
            margin-bottom: 20px;
            padding: 12px 25px;
            background: rgba(26, 188, 156, 0.03);
            border-radius: 50px;
            border: 1px solid rgba(26, 188, 156, 0.15);
        }
        .admin-footer input { 
            background: transparent;
            border: none;
            color: #1abc9c;
            font-size: 13px;
            outline: none;
            width: 280px;
        }
        .admin-footer button { 
            background: #1abc9c; 
            border: none; 
            color: #0e161d; 
            padding: 6px 18px;
            border-radius: 25px;
            font-size: 11px;
            font-weight: bold; 
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="header">
        <div id="logo-container">
            <img src="logo de la empresa.png" id="logo-imagen">
        </div>
        <div id="titulo-container">
            <h1>INCOREA CABLES</h1>
            <p id="sub-txt">REVISTA DIGITAL</p>
        </div>
    </div>

    <div id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="sistemadegestion.html">SISTEMA DE GESTIÓN</a>
        <a href="global.html">GLOBAL</a>
        <a href="otros.html">OTROS</a>
        <a href="contactos.html">CONTACTOS</a>
    </div>

    <div class="seccion-revista">
        <div class="visor-slide">
            <iframe id="iframePDF" src="Inco Magazine_Edición 003_Abr2026.pdf#toolbar=0&navpanes=0&view=FitH" allow="autoplay"></iframe>
        </div>

        <div class="admin-footer">
            <input type="text" id="nombreArchivo" placeholder="Nombre del nuevo PDF...">
            <button onclick="actualizarBoletin()">Actualizar</button>
        </div>
    </div>

    <div id="footer">
        <p>&copy; INCOREA CABLES</p>
    </div>
</div>

<script>
    const DB_URL = "https://httpsincorea-cables-default-rtdb.firebaseio.com/archivoOtros.json";

    // Al cargar, verifica si en Firebase hay un nombre más reciente guardado
    window.onload = async function() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(data && data.nombre) {
                document.getElementById('iframePDF').src = data.nombre + "#toolbar=0&navpanes=0&view=FitH";
            }
        } catch (e) { console.error("Error cargando desde Firebase:", e); }
    };

    async function actualizarBoletin() {
        const nombre = document.getElementById('nombreArchivo').value.trim();
        if(!nombre) return alert("Escribe el nombre del archivo");
        
        const pass = prompt("Introduce clave de administrador:");
        if(pass === "1234") {
            await fetch(DB_URL, {
                method: 'PUT',
                body: JSON.stringify({ nombre: nombre })
            });
            alert("Revista actualizada en la base de datos.");
            location.reload();
        } else {
            alert("Clave incorrecta.");
        }
    }
</script>

</body>
</html>
