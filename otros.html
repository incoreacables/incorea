<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES - MAGAZINE</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    <style>
        /* Blindamos el contenedor para que nada del estilos.css lo afecte */
        .seccion-revista {
            max-width: 1100px !important; 
            margin: 0 auto !important;
            padding: 20px !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
        }

        .visor-blindado {
            width: 100% !important;
            height: 2800px !important; /* Altura para 3 hojas */
            background: #0e161d !important;
            border: none !important;
            margin-bottom: 50px !important;
            overflow: hidden !important; /* MATA LA BARRA GRIS */
            position: relative !important;
        }
        
        /* Forzamos al objeto a ignorar cualquier otro estilo */
        #pdfObject { 
            width: 100% !important; 
            height: 100% !important; 
            border: none !important;
            display: block !important;
            /* El truco de subirlo un poco para esconder la cabecera del visor de Chrome */
            margin-top: -40px !important; 
        }

        .admin-footer {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: flex;
            gap: 10px;
            border: 1px solid rgba(26, 188, 156, 0.2);
        }
        .admin-footer input { background: #1a252f; border: 1px solid #333; color: #1abc9c; padding: 8px; border-radius: 5px; width: 300px; outline: none; }
        .admin-footer button { background: #1abc9c; border: none; color: #0e161d; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="header">
        <div id="logo-container"><img src="logo de la empresa.png" id="logo-imagen"></div>
        <div id="titulo-container">
            <h1>INCOREA CABLES</h1>
            <p id="sub-txt">REVISTA DIGITAL</p>
        </div>
    </div>

    <div id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="sistemadegestion.html">SISTEMA DE GESTIÓN</a>
        <a href="global.html">GLOBAL</a>
        <a href="otros.html">MAGAZINE</a>
        <a href="contactos.html">CONTACTOS</a>
    </div>

    <div class="seccion-revista">
        <div class="visor-blindado">
            <object id="pdfObject" data="" type="application/pdf">
                <embed id="pdfEmbed" src="" type="application/pdf" />
            </object>
        </div>

        <div class="admin-footer">
            <input type="text" id="nombreArchivo" placeholder="Nombre del nuevo PDF...">
            <button onclick="actualizarBoletin()">ACTUALIZAR REVISTA</button>
        </div>
    </div>
</div>

<script>
    const DB_URL = "https://httpsincorea-cables-default-rtdb.firebaseio.com/archivoOtros.json";

    async function cargarRevista() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(data && data.nombre) {
                const timestamp = new Date().getTime();
                // Forzamos los parámetros que desactivan herramientas y barras
                const params = "#toolbar=0&navpanes=0&scrollbar=0&view=FitW&pagemode=none&t=" + timestamp;
                const urlCompleta = data.nombre + params;
                
                const obj = document.getElementById('pdfObject');
                const emb = document.getElementById('pdfEmbed');
                
                obj.data = urlCompleta;
                emb.src = urlCompleta;
            }
        } catch (e) { console.error(e); }
    }

    cargarRevista();

    async function actualizarBoletin() {
        const nombre = document.getElementById('nombreArchivo').value.trim();
        if(!nombre) return alert("Escribe el nombre");
        const pass = prompt("Clave:");
        if(pass === "1234") {
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify({ nombre: nombre }) });
            location.reload();
        }
    }
</script>

</body>
</html>
