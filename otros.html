<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES - MAGAZINE</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    <style>
        body { 
            font-family: sans-serif; 
            background: #0e161d; 
            color: white; 
            margin: 0;
            overflow-x: hidden; 
        }
        
        /* Ajuste para que el contenedor no se rompa en el móvil */
        .seccion-revista {
            width: 100%;
            max-width: 1100px; 
            margin: 0 auto;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Visor responsivo: En PC alto, en móvil se ajusta */
        .visor-contenedor {
            width: 100%;
            height: 80vh; /* Usa el 80% de la altura de la pantalla del celular o PC */
            background: #16232d;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
        }

        /* Panel de admin que se ajusta al ancho del celular */
        .admin-footer {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: flex;
            flex-direction: column; /* Apila botones en móvil */
            gap: 10px;
            border: 1px solid rgba(26, 188, 156, 0.2);
            box-sizing: border-box;
        }
        
        .admin-footer input { 
            background: #1a252f; 
            border: 1px solid #333; 
            color: #1abc9c; 
            padding: 10px; 
            border-radius: 5px; 
            outline: none;
        }
        
        .admin-footer button { 
            background: #1abc9c; 
            border: none; 
            color: #0e161d; 
            padding: 10px; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
        }

        #footer { text-align: center; padding: 20px; color: #555; font-size: 12px; }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="otros.html">MAGAZINE</a>
        <a href="contactos.html">CONTACTOS</a>
    </div>

    <div class="seccion-revista">
        <div class="visor-contenedor">
            <iframe id="iframePDF" src="" allow="autoplay"></iframe>
        </div>

        <div class="admin-footer">
            <input type="text" id="nombreArchivo" placeholder="Nombre del PDF (ej: revista.pdf)">
            <button onclick="actualizarBoletin()">ACTUALIZAR REVISTA</button>
        </div>
    </div>
</div>

<div id="footer">
    <p>&copy;INCOREA-CABLES </p>
</div>

<script>
    const DB_URL = "https://httpsincorea-cables-default-rtdb.firebaseio.com/archivoOtros.json";

    async function cargarRevista() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(data && data.nombre) {
                const timestamp = new Date().getTime();
                // Google Drive Viewer es el secreto para que cargue RÁPIDO y en CUALQUIER celular
                // Solo si el archivo es público. Si es local, usamos la ruta normal:
                const urlFinal = data.nombre + "#toolbar=0&navpanes=0&view=FitW&t=" + timestamp;
                
                document.getElementById('iframePDF').src = urlFinal;
            }
        } catch (e) { console.error(e); }
    }

    cargarRevista();

    async function actualizarBoletin() {
        const nombre = document.getElementById('nombreArchivo').value.trim();
        if(!nombre) return alert("Escribe el nombre");
        const pass = prompt("Clave:");
        if(pass === "1234") {
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify({ nombre: nombre }) });
            location.reload();
        }
    }
</script>

</body>
</html>
