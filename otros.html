<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    <style>
        /* ESTILO IGUAL A TU DIRECTORIO */
        .visor-directo-container {
            margin: 30px 5%;
            background: rgba(17, 29, 40, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(26, 188, 156, 0.4);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .iframe-responsivo {
            position: relative;
            width: 100%;
            height: 75vh;
            border-radius: 8px;
            overflow: hidden;
            background: #000; /* Fondo negro para que no se vea gris */
        }

        .iframe-responsivo iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Eliminamos el desplazamiento de 'top' para que no se corte el título del PDF */
        }

        /* PANEL DE ACTUALIZACIÓN */
        .admin-panel {
            margin: 20px 5%;
            padding: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .admin-panel input { background: #1a252f; border: 1px solid #333; color: #1abc9c; padding: 10px; border-radius: 5px; width: 250px; }
        .admin-panel button { background: #1abc9c; border: none; color: #0e161d; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="header">
        <div id="logo-container"><img src="logo de la empresa.png" id="logo-imagen"></div>
        <div id="titulo-container">
            <h1>Calidad que conecta tus proyectos</h1>
            <p>Estamos para ayudarte</p>
        </div>
    </div>

    <div id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="sistemadegestion.html">SISTEMA DE GESTIÓN</a>
        <a href="global.html">GLOBAL</a>
        <a href="otros.html">MAGAZINE</a>
        <a href="contactos.html">CONTACTOS</a>
    </div>

    <div class="visor-directo-container">
        <div class="iframe-responsivo">
            <iframe id="visorPDF" src="" allowfullscreen></iframe>
        </div>
    </div>

    <div class="admin-panel">
        <input type="text" id="nuevoPDF" placeholder="Nombre del archivo...">
        <button onclick="cambiarRevista()">ACTUALIZAR</button>
    </div>
</div>

<script>
    const DB_URL = "https://httpsincorea-cables-default-rtdb.firebaseio.com/archivoOtros.json";

    async function cargarPDF() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(data && data.nombre) {
                const timestamp = new Date().getTime();
                // El secreto es "#view=FitW" al final, que fuerza al PDF a ajustarse al ancho (Width)
                const urlFinal = data.nombre + "#toolbar=0&navpanes=0&view=FitW&t=" + timestamp;
                document.getElementById('visorPDF').src = urlFinal;
            }
        } catch (e) { console.error(e); }
    }

    async function cambiarRevista() {
        const nombre = document.getElementById('nuevoPDF').value.trim();
        if(!nombre) return alert("Nombre vacío");
        const pass = prompt("Clave:");
        if(pass === "1234") {
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify({ nombre: nombre }) });
            location.reload();
        }
    }

    cargarPDF();
</script>

</body>
</html>
