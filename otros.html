<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES - MAGAZINE</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    <style>
        body { font-family: sans-serif; background: #0e161d; color: white; margin: 0; }

        /* EL CONTENEDOR (Igual al Directorio) */
        .visor-directo-container {
            margin: 20px 3%;
            background: #000; 
            border: 2px solid rgba(26, 188, 156, 0.4);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden; /* Corta lo que sobra del zoom */
            position: relative;
        }

        /* EL TRUCO DEL ZOOM */
        .iframe-responsivo {
            width: 100%;
            height: 85vh;
            position: relative;
            overflow: hidden;
        }

        #visorPDF {
            /* Hacemos el iframe un poco más ancho y alto que el cuadro para estirar el PDF */
            width: 110%; 
            height: 110%;
            position: absolute;
            top: -5%; /* Centramos el recorte arriba */
            left: -5%; /* Centramos el recorte a los lados */
            border: none;
        }

        .admin-panel {
            margin: 20px 5% 40px 5%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            border: 1px solid rgba(26, 188, 156, 0.2);
        }

        .admin-panel input { background: #1a252f; border: 1px solid #333; color: #1abc9c; padding: 12px; border-radius: 6px; width: 250px; outline: none; }
        .admin-panel button { background: #1abc9c; border: none; color: #0e161d; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="global.html">GLOBAL</a>
        <a href="otros.html">MAGAZINE</a>
    </div>

    <div class="visor-directo-container">
        <div class="iframe-responsivo">
            <iframe id="visorPDF" src=""></iframe>
        </div>
    </div>

    <div class="admin-panel">
        <input type="text" id="nuevoPDF" placeholder="Nombre del archivo...">
        <button onclick="cambiarRevista()">ACTUALIZAR</button>
    </div>
</div>

<script>
    const DB_URL = "https://httpsincorea-cables-default-rtdb.firebaseio.com/archivoOtros.json";

    async function cargarPDF() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(data && data.nombre) {
                const urlArchivo = "https://incoreacables.github.io/incorea/" + data.nombre;
                // embedded=true y el timestamp para que no use caché
                const visorGoogle = "https://docs.google.com/viewer?url=" + 
                                    encodeURIComponent(urlArchivo) + 
                                    "&embedded=true&rm=minimal&t=" + new Date().getTime();

                document.getElementById('visorPDF').src = visorGoogle;
            }
        } catch (e) { console.error(e); }
    }

    async function cambiarRevista() {
        const nombre = document.getElementById('nuevoPDF').value.trim();
        if(!nombre) return alert("Nombre vacío");
        const pass = prompt("Clave:");
        if(pass === "1234") {
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify({ nombre: nombre }) });
            location.reload();
        }
    }

    cargarPDF();
</script>

</body>
</html>
