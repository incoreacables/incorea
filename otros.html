<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES - Otros</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    <style>
        body { 
            font-family: sans-serif; 
            background: #0e161d; 
            color: white; 
            margin: 0;
            overflow-y: auto; 
        }

        /* Contenedor de la revista */
        .seccion-revista {
            max-width: 1100px; 
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Visor largo para ver todo el documento hacia abajo */
        .visor-extendido {
            width: 100%;
            height: 8500px; /* Ajusta según el largo de tu PDF */
            background: transparent;
            border: none;
            margin-bottom: 50px;
        }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
        }

        /* Panel de control abajo */
        .admin-footer {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: flex;
            gap: 10px;
            border: 1px solid rgba(26, 188, 156, 0.2);
        }
        .admin-footer input { 
            background: #1a252f; 
            border: 1px solid #333; 
            color: #1abc9c; 
            padding: 8px; 
            border-radius: 5px; 
            width: 300px; 
            outline: none;
        }
        .admin-footer button { 
            background: #1abc9c; 
            border: none; 
            color: #0e161d; 
            padding: 8px 15px; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="header">
        <div id="logo-container"><img src="logo de la empresa.png" id="logo-imagen"></div>
        <div id="titulo-container">
            <h1>INCOREA CABLES</h1>
            <p id="sub-txt">REVISTA DIGITAL</p>
        </div>
    </div>

    <div id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="sistemadegestion.html">SISTEMA DE GESTIÓN</a>
        <a href="global.html">GLOBAL</a>
        <a href="otros.html">OTROS</a>
        <a href="contactos.html">CONTACTOS</a>
    </div>

    <div class="seccion-revista">
        <div class="visor-extendido">
            <iframe id="iframePDF" src="" scrolling="no"></iframe>
        </div>

        <div class="admin-footer">
            <input type="text" id="nombreArchivo" placeholder="Nombre del archivo (ej: revista_v2.pdf)">
            <button onclick="actualizarBoletin()">ACTUALIZAR REVISTA</button>
        </div>
    </div>
</div>

<script>
    const DB_URL = "https://httpsincorea-cables-default-rtdb.firebaseio.com/archivoOtros.json";

    // CARGA CON FILTRO ANTI-CACHÉ
    window.onload = async function() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(data && data.nombre) {
                // El truco del "time" (?t=...) obliga al navegador a no usar el archivo viejo
                const timestamp = new Date().getTime();
                const linkLimpio = data.nombre + "#toolbar=0&navpanes=0&view=FitW&scrollbar=0&t=" + timestamp;
                document.getElementById('iframePDF').src = linkLimpio;
            }
        } catch (e) { console.error("Error al cargar:", e); }
    };

    async function actualizarBoletin() {
        const nombre = document.getElementById('nombreArchivo').value.trim();
        if(!nombre) return alert("Escribe el nombre del nuevo PDF.");
        
        const pass = prompt("Clave de administrador:");
        if(pass === "1234") {
            await fetch(DB_URL, { 
                method: 'PUT', 
                body: JSON.stringify({ nombre: nombre }) 
            });
            alert("¡Actualizado! Ahora la página se reiniciará para mostrar el cambio.");
            location.reload();
        } else {
            alert("Clave incorrecta.");
        }
    }
</script>

</body>
</html>
