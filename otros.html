<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES - Otros</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    <style>
        body { font-family: sans-serif; background: #0e161d; color: white; margin: 0; overflow-y: auto; }
        .seccion-revista { max-width: 1100px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .visor-extendido { width: 100%; height: 8500px; background: #16232d; border: none; margin-bottom: 50px; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        
        /* Mensaje de error si el archivo no existe */
        #error-msg { 
            display: none; position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            background: #e74c3c; color: white; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center;
        }

        .admin-footer { margin-top: 20px; padding: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; display: flex; gap: 10px; border: 1px solid rgba(26, 188, 156, 0.2); }
        .admin-footer input { background: #1a252f; border: 1px solid #333; color: #1abc9c; padding: 8px; border-radius: 5px; width: 300px; outline: none; }
        .admin-footer button { background: #1abc9c; border: none; color: #0e161d; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="header">
        <div id="logo-container"><img src="logo de la empresa.png" id="logo-imagen"></div>
        <div id="titulo-container">
            <h1>INCOREA CABLES</h1>
            <p id="sub-txt">REVISTA DIGITAL</p>
        </div>
    </div>

    <div id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="otros.html">OTROS</a>
        <a href="contactos.html">CONTACTOS</a>
    </div>

    <div class="seccion-revista">
        <div class="visor-extendido">
            <div id="error-msg">⚠️ ERROR: No se encuentra el archivo PDF en GitHub. <br> Verifica que el nombre sea EXACTO.</div>
            <iframe id="iframePDF" src="" scrolling="no" onerror="mostrarError()"></iframe>
        </div>

        <div class="admin-footer">
            <input type="text" id="nombreArchivo" placeholder="Nombre exacto (ej: revista.pdf)">
            <button onclick="actualizarBoletin()">ACTUALIZAR REVISTA</button>
        </div>
    </div>
</div>

<script>
    const DB_URL = "https://httpsincorea-cables-default-rtdb.firebaseio.com/archivoOtros.json";

    window.onload = async function() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(data && data.nombre) {
                cargarPDF(data.nombre);
            }
        } catch (e) { console.error(e); }
    };

    function cargarPDF(nombre) {
        const iframe = document.getElementById('iframePDF');
        const timestamp = new Date().getTime();
        // Construimos la URL y verificamos si existe
        const url = nombre + "#toolbar=0&navpanes=0&view=FitW&t=" + timestamp;
        
        fetch(nombre, { method: 'HEAD' }).then(res => {
            if (res.ok) {
                iframe.src = url;
                document.getElementById('error-msg').style.display = 'none';
            } else {
                mostrarError();
            }
        }).catch(() => mostrarError());
    }

    function mostrarError() {
        document.getElementById('error-msg').style.display = 'block';
    }

    async function actualizarBoletin() {
        const nombre = document.getElementById('nombreArchivo').value.trim();
        if(!nombre) return alert("Escribe el nombre del archivo.");
        
        const pass = prompt("Clave:");
        if(pass === "1234") {
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify({ nombre: nombre }) });
            location.reload();
        }
    }
</script>

</body>
</html>
