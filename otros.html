<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES - Otros</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <style>
        body { 
            font-family: sans-serif; 
            background: #0e161d; 
            color: white; 
            margin: 0;
            overflow-y: auto; 
        }

        .seccion-revista {
            max-width: 1100px; 
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .visor-extendido {
            width: 100%;
            height: 8500px; 
            background: transparent;
            border: none;
            margin-bottom: 50px;
        }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
        }

        .admin-footer {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: flex;
            flex-direction: column; /* Cambiado a columna para el cargador */
            align-items: center;
            gap: 10px;
        }
        
        .controles-subida { display: flex; gap: 10px; }
        
        .admin-footer input[type="text"] { background: #1a252f; border: 1px solid #333; color: #1abc9c; padding: 8px; border-radius: 5px; width: 300px; }
        .admin-footer button { background: #1abc9c; border: none; color: #0e161d; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #estadoSubida { font-size: 12px; color: #1abc9c; font-weight: bold; }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="header">
        <div id="logo-container"><img src="logo de la empresa.png" id="logo-imagen"></div>
        <div id="titulo-container">
            <h1>INCOREA CABLES</h1>
            <p id="sub-txt">REVISTA DIGITAL</p>
        </div>
    </div>

    <div id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="sistemadegestion.html">SISTEMA DE GESTIÓN</a>
        <a href="global.html">GLOBAL</a>
        <a href="otros.html">OTROS</a>
        <a href="contactos.html">CONTACTOS</a>
    </div>

    <div class="seccion-revista">
        <div class="visor-extendido">
            <iframe id="iframePDF" src="Inco Magazine_Edición 003_Abr2026.pdf#toolbar=0&navpanes=0&view=FitW&scrollbar=0" scrolling="no"></iframe>
        </div>

        <div class="admin-footer">
            <div class="controles-subida">
                <input type="file" id="inputArchivo" accept=".pdf" style="color:white; font-size: 12px;">
                <button onclick="subirYActualizar()">SUBIR DE PC Y ACTUALIZAR</button>
            </div>
            <div id="estadoSubida"></div>
        </div>
    </div>
</div>

<script>
    // Configura aquí tus credenciales de Firebase
    const firebaseConfig = {
        databaseURL: "https://httpsincorea-cables-default-rtdb.firebaseio.com",
        storageBucket: "httpsincorea-cables.appspot.com" 
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const storage = firebase.storage();

    // 1. Cargar el PDF actual al abrir la página
    window.onload = async function() {
        database.ref("archivoOtros/nombre").on("value", (snapshot) => {
            const link = snapshot.val();
            if(link) {
                document.getElementById('iframePDF').src = link + "#toolbar=0&navpanes=0&view=FitW&scrollbar=0";
            }
        });
    };

    // 2. Función para subir el archivo real y guardar el link
    async function subirYActualizar() {
        const file = document.getElementById('inputArchivo').files[0];
        if(!file) return alert("Selecciona un archivo PDF de tu PC");

        const pass = prompt("Clave:");
        if(pass === "1234") {
            const estado = document.getElementById('estadoSubida');
            estado.innerText = "Subiendo archivo... espera un momento.";

            try {
                // Subir el archivo al Storage de Firebase
                const storageRef = storage.ref('revistas/' + file.name);
                const task = await storageRef.put(file);
                
                // Obtener el link de internet del archivo recién subido
                const urlDescarga = await storageRef.getDownloadURL();

                // Guardar ese link en la Base de Datos
                await database.ref("archivoOtros").set({ nombre: urlDescarga });

                estado.innerText = "¡Actualizado con éxito!";
                alert("Revista publicada correctamente.");
                location.reload();

            } catch (error) {
                console.error(error);
                alert("Error al subir. Asegúrate de tener activado 'Storage' en tu consola Firebase.");
                estado.innerText = "";
            }
        } else {
            alert("Clave incorrecta");
        }
    }
</script>

</body>
</html>
