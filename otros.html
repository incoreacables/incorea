<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCOREA CABLES - Otros</title>
    <link href="estilos.css" rel="stylesheet" type="text/css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <style>
        body { font-family: sans-serif; background: #0e161d; color: white; margin: 0; overflow-y: auto; }
        .seccion-revista { max-width: 1100px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Visor extendido para ver todo el documento hacia abajo */
        .visor-extendido { 
            width: 100%; 
            height: 9000px; /* Ajusta según el largo total de tus páginas */
            background: transparent; 
            border: none; 
            margin-bottom: 50px; 
        }
        iframe { width: 100%; height: 100%; border: none; }

        .admin-footer {
            margin-top: 20px;
            padding: 20px;
            background: rgba(26, 188, 156, 0.05);
            border-radius: 15px;
            border: 1px dashed #1abc9c;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .controles { display: flex; gap: 10px; align-items: center; }
        #estado { font-size: 13px; color: #1abc9c; font-weight: bold; }
        button { background: #1abc9c; border: none; color: #0e161d; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="header">
        <div id="logo-container"><img src="logo de la empresa.png" id="logo-imagen"></div>
        <div id="titulo-container">
            <h1>INCOREA CABLES</h1>
            <p id="sub-txt">REVISTA DIGITAL</p>
        </div>
    </div>

    <div id="nav">
        <a href="index.html">INICIO</a>
        <a href="directorio.html">DIRECTORIO</a>
        <a href="sistemadegestion.html">SISTEMA DE GESTIÓN</a>
        <a href="global.html">GLOBAL</a>
        <a href="otros.html">OTROS</a>
        <a href="contactos.html">CONTACTOS</a>
    </div>

    <div class="seccion-revista">
        <div class="visor-extendido">
            <iframe id="iframePDF" src="" scrolling="no"></iframe>
        </div>

        <div class="admin-footer">
            <div class="controles">
                <input type="file" id="inputArchivo" accept=".pdf" style="color:white;">
                <button onclick="subirYActualizar()">SUBIR Y ACTUALIZAR REVISTA</button>
            </div>
            <div id="estado"></div>
        </div>
    </div>
</div>

<script>
    // REEMPLAZA ESTOS DATOS CON LOS DE TU PROYECTO
    const firebaseConfig = {
        databaseURL: "https://httpsincorea-cables-default-rtdb.firebaseio.com",
        storageBucket: "httpsincorea-cables-default-rtdb.appspot.com" 
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const storage = firebase.storage();

    // Cargar la revista guardada al iniciar
    database.ref("archivoOtros/nombre").on("value", (snapshot) => {
        const link = snapshot.val();
        if(link) {
            // Se usa FitW para que abarque todo el ancho
            document.getElementById('iframePDF').src = link + "#toolbar=0&navpanes=0&view=FitW&scrollbar=0";
        }
    });

    async function subirYActualizar() {
        const file = document.getElementById('inputArchivo').files[0];
        if(!file) return alert("Selecciona un PDF de tu PC primero.");

        const pass = prompt("Clave de administrador:");
        if(pass === "1234") {
            const estadoTxt = document.getElementById('estado');
            estadoTxt.innerText = "Subiendo archivo... espera un momento.";

            try {
                // 1. Subir el archivo al Storage
                const storageRef = storage.ref('revistas/' + file.name);
                await storageRef.put(file);
                
                // 2. Obtener el link público
                const urlDescarga = await storageRef.getDownloadURL();

                // 3. Guardar el link en la base de datos
                await database.ref("archivoOtros").set({ nombre: urlDescarga });

                estadoTxt.innerText = "¡Subida exitosa!";
                alert("La revista se ha actualizado para todos.");
                location.reload();
            } catch (error) {
                console.error(error);
                alert("Error al subir. Revisa si activaste el Storage en Firebase.");
            }
        }
    }
</script>

</body>
</html>
