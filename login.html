<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>INCOREA LOGIN</title>

<style>

body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:#0f1f2f;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
    url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    filter:blur(2px);
}

.login-box{
    position:relative;
    width:350px;
    padding:40px;
    background:rgba(14,30,47,0.95);
    border:2px solid #12d6c5;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 25px rgba(18,214,197,0.4);
    animation:aparecer 1s ease;
}

.logo{
    font-size:55px;
    color:#12d6c5;
    font-weight:bold;
    margin-bottom:10px;
}

.logo span{
    color:white;
}

h2{
    color:white;
    margin-bottom:30px;
    letter-spacing:2px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#13283d;
    color:white;
    font-size:16px;
    margin-bottom:20px;
    border:1px solid #12d6c5;
    box-sizing:border-box;
}

input:focus{
    box-shadow:0 0 10px #12d6c5;
}

/* Botón */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#12d6c5;
    color:#0f1f2f;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:white;
    transform:scale(1.03);
}

#msg{
    color:#ff5c5c;
    margin-top:15px;
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:translateY(-30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

<script>

function entrar(){

    let clave = document.getElementById("clave").value;

    const pass = "aW5jb3JlYTEyMzQ=";

    if(btoa(clave) === pass){

        sessionStorage.setItem("login","ok");

        window.location.href = "index.html";

    }else{

        document.getElementById("msg").innerHTML =
        "Contraseña incorrecta";

    }
}

</script>

</head>

<body>

<div class="login-box">

<div class="logo">Incorea <span>Cables</span></div>

<h2>ACCESO PRIVADO</h2>

<input type="password" id="clave" placeholder="Ingrese contraseña">

<button onclick="entrar()">INGRESAR</button>

<p id="msg"></p>

</div>

</body>
</html>
