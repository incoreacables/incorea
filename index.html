<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>INCOREA CABLES</title>
<link href="estilos.css" rel="stylesheet" type="text/css">
<style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #0e161d; color: white; margin: 0; overflow-x: hidden; }

    /* --- HERO DINÁMICO CON FORMA --- */
    .hero-dinamico {
        position: relative;
        height: 600px;
        width: 100%;
        background: #0e161d;
        overflow: hidden;
        /* Esta es la forma diagonal que pediste */
        clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
    }

    /* La imagen con animación de zoom */
    .hero-bg {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-image: linear-gradient(rgba(14, 22, 29, 0.6), rgba(14, 22, 29, 0.8)), url('imagen.jpg');
        background-size: cover;
        background-position: center;
        animation: zoomHero 20s infinite alternate;
        z-index: 1;
    }

    @keyframes zoomHero {
        from { transform: scale(1); }
        to { transform: scale(1.2); }
    }

    .hero-overlay {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
        text-align: center;
        padding: 0 20px;
    }

    .hero-overlay h2 { 
        font-size: 60px; 
        letter-spacing: 10px; 
        margin: 0; 
        text-shadow: 2px 2px 20px rgba(0,0,0,0.7);
        animation: fadeInUp 1s ease-out;
    }

    .hero-overlay p { 
        font-size: 18px; 
        color: #1abc9c; 
        font-weight: bold; 
        margin-top: 15px;
        letter-spacing: 3px;
    }

    .btn-brillante {
        margin-top: 30px;
        padding: 15px 40px;
        background: #1abc9c;
        color: #0e161d;
        text-decoration: none;
        font-weight: bold;
        border-radius: 50px;
        transition: 0.3s;
        box-shadow: 0 0 20px rgba(26, 188, 156, 0.4);
    }

    .btn-brillante:hover {
        background: white;
        box-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
        transform: scale(1.05);
    }

    /* Animaciones de entrada */
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Ajuste para la imagen pequeña del equipo */
    .img-hero-pequena {
        width: 150px;
        border-radius: 10px;
        margin-top: 20px;
        border: 2px solid #1abc9c;
    }
</style>
</head>
<body>
<div id="wrapper">
    <div id="header">
        <div id="logo-container"><img src="logo de la empresa.png" id="logo-imagen" alt="Logo"></div>
        <div id="titulo-container">

            <p>Estamos para ayudarte</p>
        </div>
    </div>

    <div id="nav">

        <a href="global.html">GLOBAL </a>
        <a href="otros.html">OTROS</a>
        <a href="contactos.html">CONTACTOS</a>
    </div>

    <div class="hero-dinamico">
        <div class="hero-bg"></div> <div class="hero-overlay">
            <h2>CONECTANDO EL FUTURO</h2>
            <p>TECNOLOGÍA Y CALIDAD EN CADA METRO</p>
            <img src="imagen.jpg" class="img-hero-pequena" alt="Equipo Incorea">
            <br>
            <a href="contactos.html" class="btn-brillante">DESCUBRIR MÁS</a>
        </div>
    </div>

    <div id="main-container" style="padding: 80px 5%; text-align: center;">
        <h2 style="color:#1abc9c; font-size: 32px; letter-spacing: 2px;">LÍDERES EN CONECTIVIDAD</h2>
        <p style="color:#888; margin-bottom: 40px;">Tu mejor industria en cables aquí.</p>
        
        <div class="servicios-grid">
            </div>
    </div>

    <div id="footer">
        <p>&copy;INCOREA-CABLES </p>
    </div>
</div>
</body>
